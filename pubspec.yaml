name: kids_task_tracker
description: A fun task tracker for kids with gamification elements.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_core_web: ^2.18.1
  firebase_auth_web: ^5.13.2
  cloud_firestore_web: ^4.3.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^13.0.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.18.1
  equatable: ^2.0.5
  image_picker: ^1.0.7

  # Web
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/